appId: com.mistvault.app
productName: MistVault
directories:
  output: release
files:
  - out/**
  - package.json
extraResources:
  - from: resources/ocr/tesseract
    to: ocr/tesseract
win:
  signAndEditExecutable: false
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
